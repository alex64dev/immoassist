name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PHP_VERSION: "8.3"
  NODE_VERSION: "20"

jobs:
  # ──────────────────────────────────────────────
  # Étape 1 : Lint + analyse statique PHP
  # ──────────────────────────────────────────────
  php-quality:
    name: "PHP — Lint & Analyse"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: intl, pdo_pgsql
          tools: composer:v2, php-cs-fixer, phpstan
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: api/vendor
          key: composer-${{ hashFiles('api/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: PHP CS Fixer (dry-run)
        run: php-cs-fixer fix --dry-run --diff --config=.php-cs-fixer.php
        continue-on-error: false

      - name: PHPStan
        run: vendor/bin/phpstan analyse src --level=6 --no-progress

  # ──────────────────────────────────────────────
  # Étape 2 : Tests PHP
  # ──────────────────────────────────────────────
  php-tests:
    name: "PHP — Tests"
    runs-on: ubuntu-latest
    needs: php-quality
    defaults:
      run:
        working-directory: api

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: immoassist_test
          POSTGRES_USER: immoassist
          POSTGRES_PASSWORD: immoassist
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U immoassist"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: intl, pdo_pgsql
          coverage: xdebug

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: api/vendor
          key: composer-${{ hashFiles('api/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Create test database
        run: |
          php bin/console doctrine:database:create --env=test --if-not-exists
          php bin/console doctrine:migrations:migrate --env=test --no-interaction
        env:
          DATABASE_URL: postgresql://immoassist:immoassist@localhost:5432/immoassist_test

      - name: Run PHPUnit
        run: vendor/bin/phpunit --testdox
        env:
          DATABASE_URL: postgresql://immoassist:immoassist@localhost:5432/immoassist_test
          APP_ENV: test

  # ──────────────────────────────────────────────
  # Étape 3 : Lint + build frontend
  # ──────────────────────────────────────────────
  front-build:
    name: "Frontend — Lint & Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: front/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Build
        run: npm run build

  # ──────────────────────────────────────────────
  # Étape 4 : Build Docker (sur main uniquement)
  # ──────────────────────────────────────────────
  docker-build:
    name: "Docker — Build images"
    runs-on: ubuntu-latest
    needs: [php-tests, front-build]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t immoassist-api:latest ./api

      - name: Build Frontend image
        run: docker build -t immoassist-front:latest ./front

      - name: Docker Compose validation
        run: docker compose config --quiet
